name: Reusable Work Flow

on:
    workflow_call:
        

        inputs:
            app_name:
                description: "My_Web_App"
                required: true
                type: string
            
            environment:
                description: "Production environment"
                required: true
                type: string
                default: staging
            
        secrets:
            docker_token:
                required: true
        outputs:   # Map the workflow outputs to job outputs
            build_version:
                value: ${{ jobs.reusable_work_flow.outputs.build_version }}

jobs:
    reusable_work_flow:
        runs-on: ubuntu-latest
        outputs: # Map the job outputs to step outputs
            build_version: ${{ steps.set-version.outputs.build_version }}
        steps:
            - name: Checkout Code
              uses: actions/checkout@v4

            - name: Building for environment
              run: echo "Building ${{ inputs.app_name }} for ${{ inputs.environment }}"

            - name: Verify The Docker Token
              run: |
                if [ -n "${{ secrets.docker_token }}" ]
                then
                    echo "Docker token is set : true"
                else
                    echo "Docker token is set : false"
                fi

            - name: Generate a version
              id: set-version
              run: |
                BUILD_VERSION="v1.0-${GITHUB_SHA::7}"
                echo "build_version=$BUILD_VERSION" >> $GITHUB_OUTPUT
                echo "Generated build version: $BUILD_VERSION"
