name: Build Docker Image

on:
    push:
        branches: [main]

jobs:
    build_image:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout Code
              uses: actions/checkout@v4
              
            # - name: Build and push Docker image
            #   uses: docker/build-push-action@v5
            #   with:
            #    context: .
            #    push: true
            #    tags: my_webapp:latest


            - name: Login to Docker Hub
              uses: docker/login-action@v3
              with:
               username: ${{ secrets.DOCKER_USERNAME}}
               password: ${{ secrets.DOCKER_TOKEN }}

            - name: Set short SHA using slice
              run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV
         
            - name: Build and Push Docker image
              uses: docker/build-push-action@v5
              with:
                context: .
                push: true
                tags: |
                    ${{ secrets.DOCKER_USERNAME}}/my_webapp:latest
                    ${{secrets.DOCKER_USERNAME}}/my_webapp:sha-${{ env.SHORT_SHA }}
            
            # Add a condition so the push step only runs on the main branch — not on feature branches or PRs.
            - name: Build image for other branch but not pushed
              if: github.ref_name != 'main'
              uses: docker/build-push-action@v5
              with:
                context: .
                push: false